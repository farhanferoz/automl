<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Core Model Architecture</title>
    <style>
        html {
            overflow: hidden;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
            background: #0F1B2E;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body style="overflow: hidden;">
    <svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#4FC3F7" />
            </marker>
            <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#FFA726" />
            </marker>
            <filter id="glow">
                <feGaussianBlur stdDeviation="2" result="coloredBlur" />
                <feMerge>
                    <feMergeNode in="coloredBlur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>

        <rect width="900" height="680" fill="#0F1B2E" />

        <!-- Title -->
        <text x="450" y="38" text-anchor="middle" fill="#4FC3F7" font-size="22" font-weight="bold"
            font-family="Segoe UI, system-ui, sans-serif">Probabilistic Regression Pipeline</text>

        <!-- STEP 1: Input X -->
        <rect x="340" y="55" width="220" height="42" rx="8" fill="#1A2940" stroke="#4FC3F7" stroke-width="2" />
        <text x="450" y="81" text-anchor="middle" fill="#E0E0E0" font-size="15" font-weight="bold">Input Features
            X</text>

        <!-- Arrow 1 -->
        <line x1="450" y1="97" x2="450" y2="130" stroke="#4FC3F7" stroke-width="2" marker-end="url(#arrowhead)" />

        <!-- STEP 2: Classifier -->
        <rect x="280" y="135" width="340" height="55" rx="8" fill="#1A2940" stroke="#FFA726" stroke-width="2" />
        <text x="450" y="158" text-anchor="middle" fill="#FFA726" font-size="15" font-weight="bold">Classifier (any
            model)</text>
        <text x="450" y="178" text-anchor="middle" fill="#B0BEC5" font-size="11">Neural Network, Gradient Boosting,
            XGBoost, ...</text>

        <!-- Note: any classifier -->
        <text x="640" y="152" fill="#78909C" font-size="11" font-style="italic">Softmax output</text>
        <text x="640" y="168" fill="#78909C" font-size="11" font-style="italic">over k classes</text>

        <!-- Arrow 2 -->
        <line x1="450" y1="190" x2="450" y2="223" stroke="#FFA726" stroke-width="2" marker-end="url(#arrow-orange)" />

        <!-- STEP 3: Class Probabilities -->
        <rect x="240" y="228" width="420" height="50" rx="8" fill="#1A2940" stroke="#FFA726" stroke-width="1.5"
            stroke-dasharray="5,3" />
        <text x="450" y="250" text-anchor="middle" fill="#FFA726" font-size="14" font-weight="bold">Class Probabilities:
            p₁(x), p₂(x), ..., pₖ(x)</text>
        <text x="450" y="269" text-anchor="middle" fill="#78909C" font-size="11">Σ pⱼ(x) = 1 — these are the mixing
            weights</text>

        <!-- Arrow 3: probabilities feed into regression heads -->
        <line x1="450" y1="278" x2="450" y2="315" stroke="#FFA726" stroke-width="2" marker-end="url(#arrow-orange)" />
        <text x="480" y="300" fill="#FFA726" font-size="11" font-weight="bold">pⱼ as input</text>

        <!-- STEP 4: k Separate Regression Heads -->
        <rect x="180" y="320" width="540" height="65" rx="8" fill="#1A2940" stroke="#AB47BC" stroke-width="2" />
        <text x="450" y="345" text-anchor="middle" fill="#AB47BC" font-size="15" font-weight="bold">k Separate
            Regression Heads</text>
        <text x="450" y="368" text-anchor="middle" fill="#E0E0E0" font-size="13">Each head fⱼ takes pⱼ as input and
            outputs: (μⱼ, σ²ⱼ)</text>

        <!-- Show the 3 individual heads inside -->
        <rect x="200" y="395" width="135" height="48" rx="6" fill="#0F1B2E" stroke="#AB47BC" stroke-width="1.2" />
        <text x="267" y="415" text-anchor="middle" fill="#AB47BC" font-size="12" font-weight="bold">f₁(p₁)</text>
        <text x="267" y="433" text-anchor="middle" fill="#B0BEC5" font-size="10">→ (μ₁, σ²₁)</text>

        <rect x="382" y="395" width="135" height="48" rx="6" fill="#0F1B2E" stroke="#AB47BC" stroke-width="1.2" />
        <text x="449" y="415" text-anchor="middle" fill="#AB47BC" font-size="12" font-weight="bold">f₂(p₂)</text>
        <text x="449" y="433" text-anchor="middle" fill="#B0BEC5" font-size="10">→ (μ₂, σ²₂)</text>

        <!-- Ellipsis -->
        <text x="545" y="425" text-anchor="middle" fill="#78909C" font-size="18">⋯</text>

        <rect x="565" y="395" width="135" height="48" rx="6" fill="#0F1B2E" stroke="#AB47BC" stroke-width="1.2" />
        <text x="632" y="415" text-anchor="middle" fill="#AB47BC" font-size="12" font-weight="bold">fₖ(pₖ)</text>
        <text x="632" y="433" text-anchor="middle" fill="#B0BEC5" font-size="10">→ (μₖ, σ²ₖ)</text>

        <!-- Arrow 4: heads to LoTV -->
        <line x1="267" y1="443" x2="370" y2="500" stroke="#4FC3F7" stroke-width="1.5" marker-end="url(#arrowhead)" />
        <line x1="449" y1="443" x2="449" y2="500" stroke="#4FC3F7" stroke-width="1.5" marker-end="url(#arrowhead)" />
        <line x1="632" y1="443" x2="530" y2="500" stroke="#4FC3F7" stroke-width="1.5" marker-end="url(#arrowhead)" />

        <!-- Also show probabilities going into LoTV (dashed) -->
        <path d="M 240,278 Q 130,390 340,510" fill="none" stroke="#FFA726" stroke-width="1.2" stroke-dasharray="6,4"
            marker-end="url(#arrow-orange)" />
        <text x="115" y="395" fill="#FFA726" font-size="10" font-style="italic">pⱼ also used</text>
        <text x="115" y="410" fill="#FFA726" font-size="10" font-style="italic">as weights</text>

        <!-- STEP 5: Law of Total Variance -->
        <rect x="260" y="505" width="380" height="80" rx="10" fill="#1A2940" stroke="#4FC3F7" stroke-width="2.5"
            filter="url(#glow)" />
        <text x="450" y="530" text-anchor="middle" fill="#4FC3F7" font-size="14" font-weight="bold">Law of Total
            Variance</text>
        <text x="450" y="553" text-anchor="middle" fill="#E0E0E0" font-size="12">ŷ = Σ pⱼ · μⱼ</text>
        <text x="450" y="573" text-anchor="middle" fill="#E0E0E0" font-size="12">σ² = Σ pⱼ · σ²ⱼ + Σ pⱼ · (μⱼ −
            ŷ)²</text>

        <!-- Arrow 5 -->
        <line x1="450" y1="585" x2="450" y2="618" stroke="#4FC3F7" stroke-width="2" marker-end="url(#arrowhead)" />

        <!-- STEP 6: Final output -->
        <rect x="320" y="622" width="260" height="42" rx="8" fill="#1A2940" stroke="#EF5350" stroke-width="2.5" />
        <text x="450" y="648" text-anchor="middle" fill="#EF5350" font-size="16" font-weight="bold">Prediction (ŷ,
            σ²)</text>

        <!-- GMM aside -->
        <text x="670" y="530" fill="#78909C" font-size="10" font-style="italic">≡ Gaussian Mixture</text>
        <text x="670" y="545" fill="#78909C" font-size="10" font-style="italic">with data-dependent</text>
        <text x="670" y="560" fill="#78909C" font-size="10" font-style="italic">mixing weights</text>
        <line x1="665" y1="540" x2="642" y2="540" stroke="#78909C" stroke-width="1" stroke-dasharray="4,4" />
    </svg>
</body>

</html>
