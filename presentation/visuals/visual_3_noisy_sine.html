    <title>Noisy Sine Wave: Regression vs Classification</title>

        body {

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0F1B2E;
            font-family: 'Segoe UI', system-ui, sans-serif;

    </style>
</head>

        <text x="60" y="265" text-anchor="middle" fill="#78909C" font-size="11" transform="rotate(-90 60 265)">y</text>

        <!-- Smooth predicted curve (captures trend without overfitting) -->
